<!DOCTYPE html>
<html lang="en" class="h-full bg-neutral-950 text-neutral-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRABA — Premium Streaming</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="h-full flex flex-col font-sans selection:bg-red-600 selection:text-white">

    <header class="sticky top-0 z-50 bg-neutral-950/80 backdrop-blur-md border-b border-neutral-900 px-4 lg:px-8 py-4 flex items-center justify-between">
        <div class="flex items-center gap-8">
            <a href="#/home" class="text-3xl font-black tracking-tighter text-red-600 hover:text-red-500 transition-colors">GRABA</a>
            <nav class="hidden md:flex items-center gap-6 text-sm font-medium text-neutral-400">
                <a href="#/home" class="hover:text-neutral-100 transition-colors">Browse</a>
            </nav>
        </div>
        <div>
            <a href="#/admin" id="admin-nav-btn" class="text-xs font-semibold uppercase tracking-wider text-neutral-500 hover:text-neutral-200 border border-neutral-800 rounded-full px-4 py-1.5 transition-all">Admin Panel</a>
        </div>
    </header>

    <main id="app-viewport" class="flex-1 max-w-7xl w-full mx-auto px-4 lg:px-8 py-8">
        </main>

    <div id="templates" class="hidden">
        
        <div id="view-home">
            <h2 class="text-xl font-bold mb-6 tracking-wide text-neutral-400 uppercase text-xs">Featured Content</h2>
            <div id="video-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-x-4 gap-y-8"></div>
            <div id="home-loading" class="text-center py-20 text-neutral-500">Loading catalog...</div>
            <div id="home-empty" class="hidden text-center py-20 text-neutral-500">No videos available yet. Access Admin to publish.</div>
        </div>

        <div id="view-watch" class="max-w-4xl mx-auto space-y-6">
            <button onclick="window.location.hash = '#/home'" class="inline-flex items-center gap-2 text-sm font-medium text-neutral-400 hover:text-neutral-100 transition-colors mb-2 cursor-pointer">
                ← Back to Browse
            </button>
            <div class="relative aspect-video w-full bg-black rounded-xl overflow-hidden shadow-2xl border border-neutral-900">
                <iframe id="player-frame" class="absolute inset-0 w-full h-full" 
                        sandbox="allow-scripts allow-same-origin allow-popups-to-escape-sandbox" 
                        allowfullscreen></iframe>
            </div>
            <div class="flex flex-col md:flex-row md:items-start justify-between gap-4 pt-2">
                <div>
                    <h1 id="player-title" class="text-xl md:text-2xl font-bold tracking-tight text-neutral-100">Video Title</h1>
                    <p id="player-views" class="text-sm text-neutral-400 mt-1">0 views</p>
                </div>
                <button id="player-share-btn" class="cursor-pointer bg-neutral-900 hover:bg-neutral-800 border border-neutral-800 text-neutral-100 px-5 py-2.5 rounded-lg text-sm font-semibold flex items-center gap-2 transition-all shrink-0">
                    Share Video
                </button>
            </div>
        </div>

        <div id="view-admin" class="max-w-md mx-auto py-6">
            <div id="admin-auth-box" class="bg-neutral-900/50 border border-neutral-900 rounded-2xl p-6 space-y-4">
                <h2 class="text-xl font-bold tracking-tight">Admin Authentication</h2>
                <p class="text-xs text-neutral-400">Access is exclusive to the pre-configured system platform administrator.</p>
                <form id="login-form" class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-neutral-400 uppercase tracking-wider mb-1.5">Email Address</label>
                        <input type="email" id="login-email" required class="w-full bg-neutral-950 border border-neutral-800 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-red-600 transition-colors">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-neutral-400 uppercase tracking-wider mb-1.5">Password</label>
                        <input type="password" id="login-password" required class="w-full bg-neutral-950 border border-neutral-800 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-red-600 transition-colors">
                    </div>
                    <button type="submit" class="w-full bg-red-600 hover:bg-red-700 text-white font-semibold py-2 rounded-lg text-sm transition-colors cursor-pointer">Verify Access</button>
                </form>
            </div>

            <div id="admin-dashboard" class="hidden bg-neutral-900/50 border border-neutral-900 rounded-2xl p-6 space-y-6">
                <div class="flex items-center justify-between border-b border-neutral-800 pb-4">
                    <div>
                        <h2 class="text-lg font-bold">Publish Manager</h2>
                        <p id="admin-user-tag" class="text-xs text-neutral-400 mt-0.5"></p>
                    </div>
                    <button id="logout-btn" class="text-xs text-red-400 hover:underline cursor-pointer">Sign Out</button>
                </div>
                <form id="publish-form" class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-neutral-400 uppercase tracking-wider mb-1.5">Video Title</label>
                        <input type="text" id="pub-title" required placeholder="Ex: Epic Movie Trailer" class="w-full bg-neutral-950 border border-neutral-800 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-red-600 transition-colors">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-neutral-400 uppercase tracking-wider mb-1.5">Thumbnail Image URL</label>
                        <input type="url" id="pub-thumb" required placeholder="https://images.unsplash.com/photo-..." class="w-full bg-neutral-950 border border-neutral-800 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-red-600 transition-colors">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-neutral-400 uppercase tracking-wider mb-1.5">Third-Party Embed URL</label>
                        <input type="url" id="pub-embed" required placeholder="https://www.youtube.com/embed/..." class="w-full bg-neutral-950 border border-neutral-800 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-red-600 transition-colors">
                    </div>
                    <button type="submit" class="w-full bg-red-600 hover:bg-red-700 text-white font-semibold py-2.5 rounded-lg text-sm transition-colors cursor-pointer">Publish Content</button>
                </form>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
